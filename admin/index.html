<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — SG Pro Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">📚</div>
        <div class="brand-text">
          SG PRO GROWTH
          <small>Admin Panel</small>
        </div>
      </div>
      <div class="sidebar-scroll" id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="user-avatar">MD</div>
          <div class="user-info">
            <div class="user-name" id="user-name">User</div>
            <div class="user-role" id="user-role-label">Instructor</div>
          </div>
          <button class="btn-logout" id="btn-logout" title="Log out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div>
            <h1 id="page-title">Manage Courses</h1>
            <p id="page-subtitle">Create and manage your courses</p>
          </div>
        </div>
        <div class="topbar-right">
          <div class="role-switch">
            <button class="role-btn" data-role="student">Student</button>
            <button class="role-btn active" data-role="instructor">Instructor</button>
          </div>
          <button class="btn-primary" id="header-action">Create New Course</button>
        </div>
      </header>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
