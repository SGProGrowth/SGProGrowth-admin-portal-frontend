# Render Blueprint — SG Pro Growth Admin
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy:
# 1. Copy the sg-admin URL into sg-api env CORS_ORIGIN
# 2. Copy the sg-api URL into sg-admin env VITE_API_URL (then redeploy admin)

databases:
  - name: sgpro-db
    plan: free
    databaseName: sgpro
    user: sgpro

services:
  - type: web
    name: sg-api
    runtime: node
    rootDir: Backend/sg-api
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sgpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: sgprogrowth-admin
      - key: JWT_AUDIENCE
        value: sgprogrowth-portal
      - key: WP_BASE_URL
        value: https://sharvaconsulting.com
      - key: CORS_ORIGIN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
    disk:
      name: sgpro-uploads
      mountPath: /app/uploads
      sizeGB: 1

  - type: web
    name: sg-admin
    runtime: static
    rootDir: Frontend/sg-admin
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_API
        value: "true"
      - key: VITE_API_URL
        sync: false
      - key: VITE_JWT_SECRET
        fromService:
          type: web
          name: sg-api
          envVarKey: JWT_SECRET
      - key: VITE_JWT_ISSUER
        value: sgprogrowth-admin
      - key: VITE_JWT_AUDIENCE
        value: sgprogrowth-portal
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
